# =============================================================
# Materia Magical Staff — Docker Compose Orchestration
# Private bridge network: materia-net
# Only the app port (3000) is exposed publicly.
# Volume strategy:
#   postgres-data  → persists DB across redeployments
#   uploads-data   → persists user-uploaded images across redeployments
#                    Mounted to /app/public/uploads so Next.js serves
#                    them statically at https://{domain}/uploads/{filename}
# =============================================================

name: materia-magical-staff

networks:
  materia-net:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:


services:
  # ── Next.js Application ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://materia_user:${POSTGRES_PASSWORD}@postgres:5432/materia_db
    env_file:
      - .env
    volumes:
      - uploads-data:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - materia-net
    restart: unless-stopped

  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: materia_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: materia_db
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose to host for local development (remove in pure-production)
    networks:
      - materia-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U materia_user -d materia_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
